name: Docker Image and ECR

on:
    # push:
    #   branches:
    #     - main
    #     - dev
    workflow_dispatch:     

jobs:
  terraform:

  
    name: Docker_image_to_ECR
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4


        
    
        
      - name: Build Image
        # run: docker build -t html_web_server_2 -f ../Docker/dockerfile ../Docker
        run: docker build -t html_web_server_2 Docker

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2



      - name: Tag Image
        run: |
         docker tag html_web_server_2:latest 449957914366.dkr.ecr.us-east-1.amazonaws.com/dev-nginx-repo

      - name: Push Image
        run: |
         docker push 449957914366.dkr.ecr.us-east-1.amazonaws.com/dev-nginx-repo:latest

